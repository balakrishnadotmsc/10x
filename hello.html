<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Shruti</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1fa2ff 0%, #12d8fa 50%, #a6ffcb 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.95);
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      animation: slideIn 0.6s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    h1 {
      color: #ff6b6b;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    
    .name {
      color: #2d4059;
      font-size: 3.5rem;
      font-weight: bold;
      margin: 30px 0;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.08);
    }
    
    .subtitle {
      color: #555;
      font-size: 1.1rem;
      margin: 20px 0 40px;
      line-height: 1.6;
    }
    
    .emoji {
      font-size: 4rem;
      margin: 20px 0;
    }
    
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #ff9a8b 0%, #ff6b6b 100%);
      color: white;
      padding: 12px 40px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      margin: 10px;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(255, 107, 107, 0.25);
    }
    
    footer {
      margin-top: 40px;
      color: #999;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 Welcome!</h1>
    
    <div class="emoji">👋</div>
    
    <div class="name">Balakrishna</div>
    
    <p class="subtitle">
      Hello and welcome! This is a special welcome page created just for you. 
      We're excited to have you here!
    </p>
    
    <a href="index.html" class="button">Explore More</a>
    <a href="#" class="button">Get Started</a>
    
    <footer>
      <p>Created with ❤️ - Happy to have you visit!</p>
    </footer>
  </div>
</body>
</html>
